name: Validate Website

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check files exist
        run: |
          test -f index.html
          test -f styles.css
          test -f script.js

      - name: Success
        run: echo "Website validation passed!"
